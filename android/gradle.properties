org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Djava.net.preferIPv4Stack=true
# Force IPv4 loopback for the Gradle daemon — avoids "Unable to establish
# loopback connection" on hosts with flaky IPv6/localhost resolution.
android.useAndroidX=true
# Run Gradle in-process. The daemon's client<->daemon loopback socket is blocked
# in this environment ("Unable to establish loopback connection"); no-daemon avoids it.
org.gradle.daemon=false
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
