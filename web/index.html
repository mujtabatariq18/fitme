<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="FitMe — AI-powered personalized health & fitness coaching">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FitMe">
  <meta name="theme-color" content="#FF2E93">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>FitMe — AI Health & Fitness Coach</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Branded splash shown until Flutter paints its first frame. */
    #boot {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 20px;
      background: linear-gradient(135deg, #FF4DA6, #C01C92);
      font-family: -apple-system, system-ui, sans-serif; z-index: 9999;
    }
    #boot img { width: 96px; height: 96px; border-radius: 26px;
      box-shadow: 0 12px 40px rgba(0,0,0,.25); }
    #boot .ring { width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.35); border-top-color: #fff;
      animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="boot">
    <img src="icons/Icon-192.png" alt="FitMe" />
    <div class="ring"></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Remove the splash once Flutter's first frame is up.
    window.addEventListener('flutter-first-frame', function () {
      var b = document.getElementById('boot');
      if (b) { b.style.transition = 'opacity .35s'; b.style.opacity = '0';
        setTimeout(function () { b.remove(); }, 400); }
    });
  </script>
</body>
</html>
