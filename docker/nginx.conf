server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback so deep links / refreshes resolve to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the immutable Flutter build assets.
    location ~* \.(?:js|wasm|png|jpg|jpeg|gif|svg|woff2?|ttf|json)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Never cache the entry point (so new deploys are picked up immediately).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;
}
